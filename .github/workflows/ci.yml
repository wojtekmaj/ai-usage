name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: macos-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests
        run: swift test

  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: swift build

  package:
    name: Package app
    runs-on: macos-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-usage-dmg
          path: .build/AI-Usage-*.dmg
          if-no-files-found: error
